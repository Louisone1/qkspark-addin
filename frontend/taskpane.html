<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>智编编辑助手</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="./taskpane.css"/>
</head>
<body>
<div id="app">
  <div class="header">
    <span style="font-size:20px">📝</span>
    <h1>智编编辑助手</h1>
    <span class="ver">v0.3.0</span>
  </div>

  <div id="statusBar" class="status-bar"></div>

  <div class="card">
    <h2>📋 全文编校</h2>
    <p class="hint">读取 Word 全文，AI 逐段检查语言问题</p>
    <button id="btnProofread" class="btn btn-primary" onclick="startProofread()">开始编校</button>
    <div id="progressWrap" class="progress-wrap">
      <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
      <div id="progressText" class="progress-text"></div>
    </div>
  </div>

  <div class="card">
    <h2>📚 参考文献核查</h2>
    <p class="hint">提取文末参考文献，检查格式规范与 DOI 有效性</p>
    <label style="font-size:11px; display:flex; align-items:center; gap:6px; margin-bottom:8px">
      <input type="checkbox" id="chkVerifyDoi" checked> 联网验证 DOI（较慢）
    </label>
    <button class="btn btn-primary" onclick="startRefCheck()">开始文献核查</button>
    <div id="refProgressText" class="progress-text" style="margin-top:6px"></div>
  </div>

  <div id="refResultCard" class="card" style="display:none">
    <h2>📚 文献核查结果</h2>
    <div id="refSummaryBar" class="summary-bar"></div>
    <div id="refIssueList" class="issue-list" style="margin-top:8px"></div>
  </div>

  <div id="resultCard" class="card" style="display:none">
    <h2>📊 编校报告</h2>

    <div class="stats" id="statsBar"></div>

    <div id="summaryBar" class="summary-bar" style="display:none"></div>

    <div id="batchActions" class="batch-actions" style="display:none">
      <button class="btn btn-sm btn-success" onclick="batchAcceptAll()">✅ 全部采纳</button>
      <button class="btn btn-sm btn-danger" onclick="batchIgnoreAll()">❌ 全部忽略</button>
    </div>

    <div id="issueList" class="issue-list"></div>

    <div style="display:flex; gap:8px; margin-top:10px">
      <button class="btn btn-sm btn-ghost" onclick="writeComments()">🖍️ 修订标记</button>
      <button class="btn btn-sm btn-ghost" onclick="exportReport()">📄 导出报告</button>
      <button class="btn btn-sm btn-danger" onclick="clearResults()">🗑️ 清除报告</button>
    </div>
  </div>

  <!-- 知识库管理 -->
  <div class="card" style="margin-top:10px">
    <h2 style="font-size:13px; margin:0 0 8px 0">📚 知识库</h2>
    <div id="kbStatus" style="font-size:11px; color:var(--muted); margin-bottom:8px">加载中...</div>
    <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap">
      <input type="file" id="kbFile" accept=".txt,.md,.json" style="font-size:11px; flex:1; min-width:0">
      <button class="btn btn-sm btn-primary" onclick="uploadKnowledge()">上传</button>
    </div>
    <div id="kbSources" style="margin-top:8px; font-size:11px"></div>
  </div>

  <div class="card settings-section" style="display:none;">
    <h2>⚙️ 设置</h2>
    <label>后端地址</label>
    <input id="apiUrl" type="text" value="" placeholder="留空使用当前服务器"/>
  </div>
</div>

  <script src="./taskpane.js"></script>
</body>
</html>
